<!doctype html>
<html lang="zh-CN">
  <head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Workspace Station</title>
    <link rel="icon" href="/favicon.svg" type="image/svg+xml">
    <link rel="stylesheet" href="/styles.css">
  </head>
  <body>
    <main class="shell">
      <header class="masthead">
        <div class="brand-row">
          <div class="app-mark" aria-hidden="true">
            <svg viewBox="0 0 64 64">
              <rect width="64" height="64" rx="14"></rect>
              <path d="M18 20h28v24H18z"></path>
              <path d="M18 20h28v7H18z"></path>
              <circle cx="23" cy="23.5" r="1.7"></circle>
              <circle cx="29" cy="23.5" r="1.7"></circle>
              <path d="M24 35h16M24 41h10"></path>
              <path d="M43 39l6 6M49 39l-6 6"></path>
            </svg>
          </div>
          <div class="brand-block">
            <span class="eyebrow">Workspace Station</span>
            <h1>项目工作台</h1>
          </div>
        </div>
        <div class="toolbar">
          <button id="addProjectButton" class="primary-action" type="button">
            <svg viewBox="0 0 24 24" aria-hidden="true"><path d="M12 5v14M5 12h14"/></svg>
            <span>新增项目</span>
          </button>
          <button id="refreshButton" class="icon-button" type="button" title="刷新状态" aria-label="刷新状态">
            <svg viewBox="0 0 24 24" aria-hidden="true"><path d="M21 12a9 9 0 0 1-15.6 6.1M3 12a9 9 0 0 1 15.6-6.1"/><path d="M21 4v6h-6M3 20v-6h6"/></svg>
          </button>
        </div>
      </header>

      <section class="overview" aria-live="polite">
        <div>
          <span>Running</span>
          <strong id="runningCount">0</strong>
        </div>
        <div>
          <span>Registered</span>
          <strong id="projectCount">0</strong>
        </div>
        <div>
          <span>Last Scan</span>
          <strong id="lastChecked">--:--:--</strong>
        </div>
      </section>

      <section class="workspace-layout">
        <aside class="rail">
          <span class="rail-label">Projects</span>
          <div id="projectNav" class="project-nav"></div>
        </aside>
        <section class="project-stage">
          <div class="stage-head">
            <div>
              <span>控制台</span>
              <h2>启动、停止、进入项目</h2>
            </div>
            <p id="stageMeta">等待状态刷新</p>
          </div>
          <div id="projectGrid" class="project-grid" aria-live="polite"></div>
          <section id="emptyState" class="empty-state" hidden>
            <strong>还没有项目</strong>
            <span>点击右上角新增项目。</span>
          </section>
        </section>
      </section>
    </main>

    <dialog id="projectDialog" class="project-dialog">
      <form id="projectForm" method="dialog">
        <header class="dialog-head">
          <div>
            <span id="dialogEyebrow">New Project</span>
            <strong id="dialogTitle">新增项目</strong>
          </div>
          <button id="closeDialogButton" class="icon-button" type="button" title="关闭" aria-label="关闭">
            <svg viewBox="0 0 24 24" aria-hidden="true"><path d="M18 6 6 18M6 6l12 12"/></svg>
          </button>
        </header>

        <div class="mode-tabs" role="group" aria-label="新增类型">
          <button type="button" class="mode-tab active" data-mode="project">端口项目</button>
          <button type="button" class="mode-tab" data-mode="html">HTML 文件</button>
          <input type="hidden" name="projectMode" value="project">
        </div>

        <div class="form-grid">
          <label>
            <span>项目名称</span>
            <input name="name" autocomplete="off" required placeholder="例如 Atlas">
          </label>
          <label class="project-only">
            <span>前端端口</span>
            <input name="frontendPort" inputmode="numeric" autocomplete="off" placeholder="5173">
          </label>
          <label class="wide html-only" hidden>
            <span>HTML 文件位置</span>
            <input name="htmlFile" autocomplete="off" placeholder="例如 ai-image-studio.html 或 D:\tools\demo.html">
          </label>
          <label class="wide">
            <span>描述</span>
            <input name="summary" autocomplete="off" placeholder="一句话说明这个项目">
          </label>
          <label class="project-only">
            <span>后端端口</span>
            <input name="backendPort" inputmode="numeric" autocomplete="off" placeholder="8080">
          </label>
          <label class="switch-field project-only">
            <span>开启监听</span>
            <input name="listenEnabled" type="checkbox" checked>
          </label>
          <label class="wide project-only">
            <span>开始脚本</span>
            <input name="startScript" autocomplete="off" placeholder="cmd /c start-atlas.bat">
          </label>
          <label class="wide project-only">
            <span>关闭脚本</span>
            <input name="stopScript" autocomplete="off" placeholder="cmd /c stop-atlas.bat">
          </label>
        </div>

        <footer class="dialog-actions">
          <button class="ghost-action" type="button" id="cancelDialogButton">取消</button>
          <button class="primary-action" type="submit">
            <svg viewBox="0 0 24 24" aria-hidden="true"><path d="m5 12 5 5L20 7"/></svg>
            <span id="submitLabel">保存项目</span>
          </button>
        </footer>
      </form>
    </dialog>

    <div id="toast" class="toast" role="status" aria-live="polite"></div>
    <script src="/app.js"></script>
  </body>
</html>
