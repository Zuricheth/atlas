spring:
  datasource:
    driver-class-name: org.h2.Driver
    url: "${ATLAS_H2_DATASOURCE_URL:jdbc:h2:file:./data/atlas;MODE=MySQL;DATABASE_TO_LOWER=TRUE;CASE_INSENSITIVE_IDENTIFIERS=TRUE;DB_CLOSE_DELAY=-1}"
    username: "${ATLAS_H2_DATASOURCE_USERNAME:sa}"
    password: "${ATLAS_H2_DATASOURCE_PASSWORD:}"
  flyway:
    enabled: false
  servlet:
    multipart:
      max-file-size: 200MB
      max-request-size: 1GB
  sql:
    init:
      mode: always
      schema-locations: classpath:schema-h2.sql
  h2:
    console:
      enabled: true
      path: /h2-console

mybatis-plus:
  global-config:
    db-config:
      logic-delete-field: deleted
      logic-delete-value: 1
      logic-not-delete-value: 0
